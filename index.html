<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Lookup!</title>
    <script src="app.js" defer></script>
  </head>
  <body>
      <div id="storage">
        <form id="pokeForm">
          <label>
            Enter a Pokemon Number:
            <input type="number" name="pokemonInput" id="pokemonInput" />
          </label>

          <label>
            Enter a Pokemon Name:
            <input type="input" name="nameInput" id="nameInput" />
          </label>

          <button>Submit</button>
          <br></br>
          <a href="" id="link" target="_blank">
            Pokemon Here!
          </a>
        </form>
      </div></body>
</html>
